<script type="text/javascript">
(function() {
    const html = document.documentElement;
    
    // 1. Set the theme immediately based on localStorage
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        html.setAttribute("data-theme", "dark");
    }

    // 2. Use a Global Event Listener (Delegation)
    // This works even if the navigation menu re-renders or changes
    document.addEventListener("click", function(e) {
        // Find if the clicked element (or its parent) is our toggle button
        const btn = e.target.closest("#theme-toggle");
        
        if (btn) {
            e.preventDefault();
            const icon = document.getElementById("theme-icon");
            const isDark = html.getAttribute("data-theme") === "dark";
            
            if (isDark) {
                html.removeAttribute("data-theme");
                localStorage.setItem("theme", "light");
                if (icon) {
                    icon.classList.remove("fa-moon");
                    icon.classList.add("fa-sun");
                }
            } else {
                html.setAttribute("data-theme", "dark");
                localStorage.setItem("theme", "dark");
                if (icon) {
                    icon.classList.remove("fa-sun");
                    icon.classList.add("fa-moon");
                }
            }
        }
    });

    // 3. Fix the icon on initial page load
    window.addEventListener("DOMContentLoaded", function() {
        const icon = document.getElementById("theme-icon");
        if (localStorage.getItem("theme") === "dark" && icon) {
            icon.classList.remove("fa-sun");
            icon.classList.add("fa-moon");
        }
    });
})();
</script>
