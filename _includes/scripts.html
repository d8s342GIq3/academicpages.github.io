{% include comments-providers/scripts.html %}

<script type="text/javascript">
(function() {
    const html = document.documentElement;
    
    // Apply saved theme immediately
    if (localStorage.getItem("theme") === "dark") {
        html.setAttribute("data-theme", "dark");
    }

    // Use Global Event Delegation
    document.addEventListener("click", function(e) {
        // Look for the toggle button specifically by the 'toggle theme' title
        const btn = e.target.closest('[title="toggle theme"]') || e.target.closest('#theme-toggle');
        
        if (btn) {
            e.preventDefault();
            e.stopPropagation(); // Stop other scripts from interfering
            
            const isDark = html.getAttribute("data-theme") === "dark";
            const icon = btn.querySelector('i') || document.getElementById("theme-icon");
            
            if (isDark) {
                html.removeAttribute("data-theme");
                localStorage.setItem("theme", "light");
                if (icon) {
                    icon.classList.remove("fa-moon");
                    icon.classList.add("fa-sun");
                }
            } else {
                html.setAttribute("data-theme", "dark");
                localStorage.setItem("theme", "dark");
                if (icon) {
                    icon.classList.remove("fa-sun");
                    icon.classList.add("fa-moon");
                }
            }
        }
    }, true); // Use 'true' for capture phase to beat the GreedyNav script
})();
</script>
