{% include comments-providers/scripts.html %}

<script>
  (function() {
    // 1. THEME PERSISTENCE (Runs immediately)
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }

    window.addEventListener("DOMContentLoaded", function() {
      // 2. ICON SYNC
      var icon = document.getElementById("theme-icon");
      if (localStorage.getItem("theme") === "dark" && icon) {
        icon.classList.replace("fa-sun", "fa-moon");
      }

      // 3. THE "FORCE" LINK HANDLER
      // We listen to the whole document for clicks
      document.addEventListener('click', function(e) {
        // Find the link being clicked (even if it's inside another element)
        var target = e.target.closest('a');
        
        if (target && target.hostname && target.hostname !== window.location.hostname) {
          // If the link is external, force target="_blank"
          target.setAttribute('target', '_blank');
          target.setAttribute('rel', 'noopener noreferrer');
        }
      }, true); // The 'true' ensures we catch the click before other scripts stop it
    });
  })();
</script>
