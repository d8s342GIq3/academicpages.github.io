{% include analytics.html %}
{% include comments-providers/scripts.html %}

<script>
  // 1. THE "FORCE" LINK HANDLER
  function tagLinks() {
    var links = document.querySelectorAll('a[href^="http"]');
    for (var i = 0; i < links.length; i++) {
      if (!links[i].href.includes(window.location.hostname)) {
        links[i].target = "_blank";
        links[i].rel = "noopener noreferrer";
      }
    }
  }

  var count = 0;
  var interval = setInterval(function() {
    tagLinks();
    if (++count > 6) clearInterval(interval);
  }, 500);

  // 2. MODERN PAGE TRANSITION (The "Speed" trick)
  window.addEventListener("beforeunload", function () {
    document.body.style.opacity = "0.5";
    document.body.style.transition = "opacity 0.25s";
  });

  // Handle transitions for the site title and root links
  document.querySelectorAll('.site-title, a[href="/"]').forEach(function(el) {
    el.addEventListener("click", function() {
      document.body.style.opacity = "0";
      document.body.style.transition = "opacity 0.15s ease-out";
    });
  });
  
  (function() {
    // 3. THEME PERSISTENCE
    if (localStorage.getItem("theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }

    window.addEventListener("DOMContentLoaded", function() {
      // Fade in the body once loaded
      document.body.style.opacity = "1";
      
      // 4. ICON SYNC
      var icon = document.getElementById("theme-icon");
      if (icon) {
        if (localStorage.getItem("theme") === "light") {
          icon.classList.replace("fa-moon", "fa-sun");
        } else {
          icon.classList.replace("fa-sun", "fa-moon");
        }
      }
    });
  })();
</script>
