{% include comments-providers/scripts.html %}

<script>
  (function() {
    // 1. THEME PERSISTENCE
    // Since Purple is default, we only care if the user previously chose "light"
    if (localStorage.getItem("theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }

    window.addEventListener("DOMContentLoaded", function() {
      // 2. ICON SYNC
      var icon = document.getElementById("theme-icon");
      if (icon) {
        // If the theme is currently light, show the sun
        if (localStorage.getItem("theme") === "light") {
          icon.classList.replace("fa-moon", "fa-sun");
        } else {
          // Otherwise, ensure it's a moon (for purple mode)
          icon.classList.replace("fa-sun", "fa-moon");
        }
      }

      // 3. THE "FORCE" LINK HANDLER
      document.addEventListener('click', function(e) {
        var target = e.target.closest('a');
        if (target && target.hostname && target.hostname !== window.location.hostname) {
          target.setAttribute('target', '_blank');
          target.setAttribute('rel', 'noopener noreferrer');
        }
      }, true);
    });
  })();
</script>
