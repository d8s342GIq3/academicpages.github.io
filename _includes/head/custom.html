{% include base_path %}

<!-- Critical for Mobile Alignment -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  /* Apply background to both html and body for mobile consistency */
  html, body { 
    background-color: #332941 !important; 
    margin: 0; 
    padding: 0;
    overflow-x: hidden; /* Prevents side-scrolling on mobile */
  } 

  [data-theme="light"] html, 
  [data-theme="light"] body { 
    background-color: #F8E55A !important; 
  }

  /* Ensure images and embeds don't "poke out" of the screen */
  img, iframe {
    max-width: 100%;
  }
  @media (max-width: 600px) {
  /* Forces the sidebar to stay within bounds */
  .sidebar {
    width: 100% !important;
    position: relative !important;
    float: none !important;
    margin-bottom: 2em !important;
  }

  /* Centers the main content and prevents side-scrolling */
  .archive, .page, .single {
    width: 100% !important;
    padding-right: 15px !important;
    padding-left: 15px !important;
  }
}
</style>

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>

<script>
  // Simplified theme check
  const currentTheme = localStorage.getItem("theme") || "dark";
  if (currentTheme === "light") {
    document.documentElement.setAttribute("data-theme", "light");
  }
</script>
