- title: "Awe as a Guide in Education"
  venue: "PsyTales"
  date: "2024-08-27"
  link: "https://psytales.eu/uncategorized/awe-as-a-guide-in-education/"
  excerpt: "Stargazing, looking at a beautiful view from the top of a mountain, or listening to your favourite song. All of these experiences have at least one emotion in common: awe. It is a transformative emotion, which challenges our current assumptions about what we know, and shows us just how much we don’t know, making it perfect for the classroom..."

- title: "Rooted in Wisdom: How Nature-Based Education Nurtures Our Future Minds"
  venue: "PsyTales"
  date: "2025-03-07"
  link: "https://psytales.eu/uncategorized/rooted-in-wisdom-how-nature-based-education-nurtures-our-future-minds/"
  excerpt: "Nature-based education goes by many names, but any classroom activity in nature counts. From sitting down and reading Shakespeare in the school garden to lifting logs and counting the different types of bugs you can find, engaging students in nature as part of the curriculum provides them countless physical, psychological, and academic benefits..."
